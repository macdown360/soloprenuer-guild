            <div class="panel-head">
              <div>
                <p class="eyebrow">NEW PASSWORD</p>
                <h1>新しいパスワードを設定</h1>
              </div>
              <i data-lucide="key-round" aria-hidden="true"></i>
            </div>
            <div class="guild-form auth-form">
              <form class="auth-form-inner" id="passwordUpdateForm" hidden>
                <label>
                  新しいパスワード
                  <input name="password" type="password" placeholder="8文字以上" autocomplete="new-password" required minlength="8" />
                </label>
                <div class="auth-actions">
                  <button class="btn btn-primary" type="submit"><i data-lucide="key-round"></i>パスワードを更新</button>
                </div>
              </form>
              <p class="form-note" data-password-update-note>再設定メール内のURLから開いてください。</p>
              <a class="auth-text-link" href="forgot-password.html">再設定メールを送り直す</a>
