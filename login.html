<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ログイン | ソロプレナー・ギルド</title>
    <meta
      name="description"
      content="ソロプレナー・ギルドのログインページ。登録済みの冒険者アカウントでマイページへ進めます。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Shippori+Mincho:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/lucide@0.462.0/dist/umd/lucide.min.js"></script>
  </head>
  <body class="dashboard-page login-page">
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="logo" href="index.html">
          <span class="logo-mark" aria-hidden="true">
            <svg viewBox="0 0 32 32" focusable="false">
              <path d="M16 3.5 26 7.7v7.1c0 6.5-3.9 11.3-10 13.7C9.9 26.1 6 21.3 6 14.8V7.7Z" />
              <path d="M16 8.3 20.8 10.3v4.1c0 3.3-1.7 5.8-4.8 7.6Z" />
              <path d="M16 10.7 17.2 13.1l2.7.4-2 1.9.5 2.7-2.4-1.3-2.4 1.3.5-2.7-2-1.9 2.7-.4Z" />
            </svg>
          </span>
          <span>ソロプレナー・ギルド</span>
        </a>
        <button class="menu-toggle" type="button" aria-controls="global-nav" aria-expanded="false" aria-label="メニューを開く">
          <i data-lucide="menu"></i>
        </button>
        <nav class="nav-links" id="global-nav" aria-label="グローバルメニュー">
          <a href="index.html"><i data-lucide="home"></i>トップ</a>
          <a href="quests.html"><i data-lucide="search"></i>クエスト検索</a>
          <a href="mypage.html"><i data-lucide="layout-dashboard"></i>マイページ</a>
          <a href="charter.html"><i data-lucide="book-open"></i>ギルド憲章</a>
        </nav>
      </div>
    </header>

    <main class="dashboard-main">
      <section class="section auth-section login-section" data-login-panel>
        <div class="container auth-grid login-grid">
          <article class="workspace-panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">LOGIN</p>
                <h1>ログイン</h1>
              </div>
              <span class="status-pill" data-auth-status>デモ</span>
            </div>
            <form class="guild-form auth-form" id="authForm">
              <label>
                メールアドレス
                <input name="email" type="email" placeholder="you@example.com" autocomplete="email" required />
              </label>
              <label>
                パスワード
                <input name="password" type="password" placeholder="8文字以上" autocomplete="current-password" required />
              </label>
              <div class="header-actions">
                <button class="btn btn-primary" type="submit" data-auth-action="signin"><i data-lucide="log-in"></i>ログイン</button>
                <a class="btn btn-outline" href="index.html#register" data-guest-only hidden><i data-lucide="user-plus"></i>冒険者登録</a>
                <a class="btn btn-outline" href="quests.html" data-guest-only hidden><i data-lucide="search"></i>クエストを見る</a>
              </div>
              <p class="form-note" data-auth-note>メールアドレスとパスワードを入力してください。</p>
            </form>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <span>&copy; 2026 ソロプレナー・ギルド</span>
        <nav class="footer-links" aria-label="フッター">
          <a href="index.html">トップ</a>
          <a href="quests.html">クエスト検索</a>
          <a href="mypage.html">マイページ</a>
          <a href="charter.html">ギルド憲章</a>
          <a href="privacy.html">プライバシーポリシー</a>
        </nav>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-env.js"></script>
    <script src="app.js"></script>
    <script>document.addEventListener('DOMContentLoaded', function () { if (window.lucide) lucide.createIcons(); });</script>
  </body>
</html>
